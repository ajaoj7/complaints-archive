<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Archive System</title>
    <meta name="description" content="النظام المركزي الموحد لإيداع وحفظ الأدلة الرقمية والشكاوي.">
    <meta property="og:title" content="Marvel Archive System">
    <meta property="og:description" content="النظام المركزي الموحد لإيداع وحفظ الأدلة الرقمية والشكاوي.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#2563eb">
    <meta property="og:image" content="https://images.unsplash.com/photo-1614064641913-6b70fea0cef6?q=80&w=1200&auto=format&fit=crop"> 
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        @keyframes progress-shimmer {
          from { background-position: 0 0; }
          to { background-position: 40px 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY_d2xN4LttgidRoHpHa_jH1NZkYGxOHQ",
            authDomain: "complaints-archive.firebaseapp.com",
            projectId: "complaints-archive",
            storageBucket: "complaints-archive.firebasestorage.app",
            messagingSenderId: "765352455359",
            appId: "1:765352455359:web:4a033e9a6f26fcc09f2a0a"
        };

        const app = initializeApp(firebaseConfig);
        
        window.fb = {
            auth: getAuth(app),
            db: getFirestore(app),
            signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, doc, deleteDoc
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const { auth, db, signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, doc, deleteDoc } = window.fb;
            
            const [user, setUser] = useState(null);
            const [complaints, setComplaints] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [passInput, setPassInput] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [searchTerm, setSearchTerm] = useState("");
            const [statusNote, setStatusNote] = useState(null);
            
            const [uploadSuccessData, setUploadSuccessData] = useState(null);

            // ==========================================
            // إعدادات الروابط (السحابة والويبهوك)
            // ==========================================
            const CLOUD_NAME = "dcgw0c0nv";
            const UPLOAD_PRESET = "Archive_Acc_1";
            const ADMIN_PASS = "123456";
            const APP_ID = "marvel-archive-system";
            
            // رابط الويبهوك المباشر الخاص بك
            const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1499333079246966894/KwofaiLx28gjv9wnZUP8uRCkrtxNPi8a91xxH_0EjKVX95b1vlnh8lrF7IxxudB4gjYx"; 

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } 
                    catch (e) { console.error("Auth Error:", e); }
                };
                setTimeout(initAuth, 500); 
                
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const complaintsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'complaints');
                const unsubscribe = onSnapshot(complaintsRef, (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setComplaints(list.sort((a, b) => b.at - a.at));
                }, (error) => {
                    console.error("Firestore Error:", error);
                });
                return () => unsubscribe();
            }, [user]);

            const showStatus = (type, msg) => {
                setStatusNote({ type, msg });
                if (type === 'success') setTimeout(() => setStatusNote(null), 8000);
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                
                const file = e.target.elements.file.files[0];
                const complainer = e.target.elements.complainer.value;
                const complainedAgainst = e.target.elements.complainedAgainst.value;
                const reason = e.target.elements.reason.value;
                const punishment = e.target.elements.punishment.value || "لا يوجد";

                if (!file || !complainer || !complainedAgainst || !reason || !user) return;
                
                setUploading(true);
                setUploadProgress(0);
                setStatusNote(null);
                setUploadSuccessData(null); 

                try {
                    const uploadToCloudinary = () => {
                        return new Promise((resolve, reject) => {
                            const xhr = new XMLHttpRequest();
                            const formData = new FormData();
                            formData.append('file', file);
                            formData.append('upload_preset', UPLOAD_PRESET);

                            xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, true);

                            xhr.upload.onprogress = (event) => {
                                if (event.lengthComputable) {
                                    const percent = Math.round((event.loaded / event.total) * 100);
                                    setUploadProgress(percent);
                                }
                            };

                            xhr.onload = () => {
                                if (xhr.status === 200) {
                                    resolve(JSON.parse(xhr.responseText));
                                } else {
                                    reject(new Error("فشل الرفع في السحابة"));
                                }
                            };

                            xhr.onerror = () => reject(new Error("حدث خطأ في الاتصال بالسحابة. تحقق من الإنترنت."));
                            xhr.send(formData);
                        });
                    };

                    const resJson = await uploadToCloudinary();

                    if (!resJson.secure_url) {
                        throw new Error("حدث خطأ في استخراج رابط الملف من السحابة.");
                    }

                    // إرسال البيانات للديسكورد (بدون منشن ومع توقيع Majaz)
                    if(DISCORD_WEBHOOK_URL) {
                        const discordMessage = `السلام عليكم ورحمة الله وبركاته
أسعد الله أوقاتكم بكل خير..

يتم إدراج جميع مقاطع الفيديو الخاصة بالشكاوى المقبولة هنا، وذلك للتوثيق والرجوع إليها عند الحاجة

كما نود الالتزام بالاستبيان المذكور ادناه :

1- المشتكي : **${complainer}**
2- المشتكي عليه : **${complainedAgainst}**
3- المخالفة او سبب الشكوى : **${reason}**
4- المحاسبة ان كان يوجد : **${punishment}**
5- التصوير او الاثبات : ${resJson.secure_url}

ملاحظة : عدم الالتزام بارسال التصوير يعرضك للمحاسبة.

**Powered by Majaz**`;

                        await fetch(DISCORD_WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: discordMessage })
                        });
                    }

                    await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'complaints'), {
                        title: `شكوى ضد: ${complainedAgainst}`,
                        complainer: complainer,
                        complainedAgainst: complainedAgainst,
                        reason: reason,
                        punishment: punishment,
                        url: resJson.secure_url,
                        type: file.type,
                        at: Date.now(),
                        size: (file.size / (1024 * 1024)).toFixed(2) + " MB",
                        uid: user.uid
                    });

                    setUploadSuccessData(true);
                    showStatus('success', 'تم الإيداع وإرسال الشكوى إلى الديسكورد بنجاح!');

                } catch (error) {
                    console.error("Upload error details:", error);
                    showStatus('error', error.message || 'حدث خطأ تقني أثناء معالجة الملف.');
                } finally {
                    setUploading(false);
                }
            };

            const filtered = useMemo(() => {
                return complaints.filter(c => 
                    c.title?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    c.complainer?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    c.complainedAgainst?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [complaints, searchTerm]);

            const closeUploadModal = () => {
                setIsModalOpen(false);
                setUploadSuccessData(null); 
            };

            return (
                <div className="min-h-screen bg-[#050505] text-white selection:bg-blue-600/30 overflow-x-hidden flex flex-col">
                    <nav className="h-20 bg-black/40 backdrop-blur-2xl sticky top-0 z-50 px-6 flex items-center justify-between border-b border-white/5 shadow-2xl">
                        <div className="flex items-center gap-3">
                            <div className="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-600/40">
                                <i data-lucide="database" className="text-white w-6 h-6"></i>
                            </div>
                            <h1 className="text-xl font-black tracking-tighter uppercase hidden md:block">Marvel Archive System</h1>
                        </div>
                        
                        <div className="flex items-center gap-2">
                            {!isAdmin ? (
                                <button onClick={() => setShowAdminLogin(true)} className="p-3 text-slate-500 hover:text-white hover:bg-white/5 rounded-xl transition-all" title="دخول الإدارة">
                                    <i data-lucide="lock" className="w-5 h-5"></i>
                                </button>
                            ) : (
                                <button onClick={() => setIsAdmin(false)} className="p-3 text-red-500 hover:bg-red-500/10 rounded-xl transition-all flex items-center gap-2 font-bold text-xs">
                                    <i data-lucide="log-out" className="w-4 h-4"></i> خروج
                                </button>
                            )}
                            <button onClick={() => { setStatusNote(null); setIsModalOpen(true); }} className="bg-blue-600 px-6 py-2.5 rounded-2xl font-bold hover:bg-blue-500 transition-all flex items-center gap-2 text-sm shadow-xl shadow-blue-600/20 active:scale-95 border border-blue-400/20">
                                <i data-lucide="plus" className="w-4 h-4"></i> إيداع دليل
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 py-10 flex-grow w-full">
                        {statusNote && !isModalOpen && (
                            <div className={`mb-8 p-5 rounded-[1.5rem] flex items-center gap-4 border shadow-2xl ${statusNote.type === 'success' ? 'bg-green-500/10 border-green-500/20 text-green-400' : 'bg-red-500/10 border-red-500/20 text-red-400'}`}>
                                <i data-lucide={statusNote.type === 'success' ? 'check-circle' : 'alert-circle'} className="w-6 h-6 shrink-0"></i>
                                <p className="text-sm font-bold flex-grow leading-relaxed">{statusNote.msg}</p>
                                <button onClick={() => setStatusNote(null)} className="p-1 hover:bg-white/10 rounded-lg transition-colors">
                                    <i data-lucide="x" className="w-5 h-5 opacity-50 hover:opacity-100"></i>
                                </button>
                            </div>
                        )}

                        {isAdmin ? (
                            <>
                                <div className="mb-12 relative group">
                                    <i data-lucide="search" className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                                    <input 
                                        className="w-full bg-white/[0.03] border border-white/5 pr-14 pl-6 py-5 rounded-[2.5rem] outline-none focus:border-blue-600/50 focus:ring-4 focus:ring-blue-600/5 transition-all text-sm placeholder:text-slate-600" 
                                        placeholder="ابحث بواسطة اسم المشتكي أو المشتكي عليه..." 
                                        value={searchTerm} 
                                        onChange={e => setSearchTerm(e.target.value)} 
                                    />
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {filtered.map(c => (
                                        <div key={c.id} className="bg-white/[0.02] rounded-[2.5rem] overflow-hidden group border border-white/5 hover:border-blue-500/30 transition-all duration-500 shadow-2xl flex flex-col">
                                            <div className="aspect-video bg-black relative overflow-hidden">
                                                {c.type && c.type.includes('video') ? (
                                                    <video src={c.url} controls className="w-full h-full object-cover" />
                                                ) : (
                                                    <img src={c.url} className="w-full h-full object-cover" alt="دليل مرئي" />
                                                )}
                                                <div className="absolute top-4 right-4 bg-black/70 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold text-blue-400 border border-white/10 flex items-center gap-1.5">
                                                    <div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
                                                    {c.size || "Unknown"}
                                                </div>
                                            </div>
                                            <div className="p-8 flex flex-col flex-grow">
                                                <h3 className="font-bold text-lg mb-1 text-white tracking-tight">{c.title || "شكوى"}</h3>
                                                <div className="flex items-center gap-2 text-slate-500 text-[10px] mb-5 font-bold uppercase tracking-widest">
                                                    <i data-lucide="clock" className="w-3 h-3"></i>
                                                    {new Date(c.at).toLocaleString('ar-EG')}
                                                </div>
                                                
                                                <div className="bg-white/5 rounded-xl p-4 mb-6 space-y-2 text-xs flex-grow border border-white/5">
                                                    <div className="flex flex-col"><span className="text-slate-500 mb-1">المشتكي:</span> <span className="font-bold text-blue-400">{c.complainer || "غير متوفر"}</span></div>
                                                    <div className="flex flex-col"><span className="text-slate-500 mb-1">المخالفة:</span> <span className="font-bold">{c.reason || c.desc}</span></div>
                                                    <div className="flex flex-col"><span className="text-slate-500 mb-1">المحاسبة:</span> <span className="font-bold text-red-400">{c.punishment || "لا يوجد"}</span></div>
                                                </div>

                                                <div className="flex gap-2 mt-auto">
                                                    <a href={c.url} target="_blank" className="flex-1 py-4 bg-blue-600/10 text-blue-400 rounded-2xl text-xs font-black hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center gap-2 text-center">
                                                        <i data-lucide="external-link" className="w-4 h-4"></i> فتح الملف
                                                    </a>
                                                    <button onClick={async () => { if(confirm('حذف هذا السجل نهائياً؟')) await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'complaints', c.id)); }} className="p-4 bg-red-950/20 text-red-500 rounded-2xl hover:bg-red-600 hover:text-white transition-all active:scale-95 shadow-lg">
                                                        <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                {filtered.length === 0 && (
                                    <div className="text-center py-20 bg-white/[0.01] border border-dashed border-white/5 rounded-[3rem]">
                                        <i data-lucide="file-text" className="w-12 h-12 text-slate-800 mx-auto mb-4 block"></i>
                                        <p className="text-slate-600 font-bold">لم يتم العثور على نتائج للبحث.</p>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div className="text-center py-24 max-w-3xl mx-auto flex flex-col items-center">
                                <div className="w-32 h-32 bg-blue-600/5 rounded-[2.5rem] flex items-center justify-center mb-12 border border-blue-500/10 shadow-[0_0_80px_-15px_rgba(37,99,235,0.2)] rotate-3 hover:rotate-0 transition-transform duration-500">
                                    <i data-lucide="upload-cloud" className="w-16 h-16 text-blue-500"></i>
                                </div>
                                <h2 className="text-6xl font-black mb-8 tracking-tighter uppercase leading-tight">
                                    Marvel Archive <br /> <span className="text-blue-600">System</span>
                                </h2>
                                <p className="text-slate-500 mb-14 text-xl leading-relaxed font-medium max-w-xl">
                                    النظام المركزي الموحد لإيداع الأدلة الرقمية والشكاوي. 
                                    يتم أتمتة إرسال الشكاوي إلى السيرفر الخاص بالإدارة فوراً.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-4 w-full justify-center">
                                    <button onClick={() => { setStatusNote(null); setIsModalOpen(true); }} className="bg-blue-600 px-12 py-6 rounded-[2.5rem] font-black text-2xl shadow-2xl active:scale-95 transition-all shadow-blue-600/30 border border-blue-400/20">
                                        بدء عملية الإيداع
                                    </button>
                                    <button onClick={() => setShowAdminLogin(true)} className="bg-white/[0.03] border border-white/5 px-12 py-6 rounded-[2.5rem] font-black text-2xl hover:bg-white/10 transition-all active:scale-95">
                                        دخول الإدارة
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* الفوتر مع إضافة العلامة التجارية */}
                    <footer className="py-12 flex flex-col items-center justify-center gap-3 border-t border-white/5 mt-auto">
                        <div className="text-slate-800 text-[11px] font-black tracking-[0.5em] uppercase text-center">
                            Marvel Archive System — Secured Administrative Server
                        </div>
                        <div className="text-blue-500/60 text-[11px] font-black tracking-[0.3em] uppercase">
                            Powered by Majaz
                        </div>
                    </footer>

                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 px-4 backdrop-blur-3xl">
                            <div className="bg-[#0a0a0a] p-12 rounded-[3.5rem] w-full max-w-sm text-center border border-white/10 shadow-2xl relative overflow-hidden">
                                <div className="absolute -top-20 -left-20 w-40 h-40 bg-blue-600/10 blur-[80px]"></div>
                                <i data-lucide="shield-check" className="w-14 h-14 text-blue-600 mx-auto mb-8 block"></i>
                                <h2 className="text-2xl font-black mb-10 tracking-widest uppercase">Identity Verification</h2>
                                <input 
                                    type="password" autoFocus 
                                    className="w-full bg-white/[0.03] rounded-[1.5rem] p-6 text-center text-3xl tracking-[0.6em] outline-none border border-white/5 focus:border-blue-600 transition-all shadow-inner" 
                                    placeholder="••••••" 
                                    value={passInput} 
                                    onChange={e => setPassInput(e.target.value)} 
                                />
                                <button onClick={() => { if(passInput === ADMIN_PASS) { setIsAdmin(true); setShowAdminLogin(false); setPassInput(""); } else showStatus('error', 'رمز التحقق غير صحيح.'); }} className="w-full bg-blue-600 py-5 rounded-[1.5rem] mt-8 font-black text-lg shadow-xl shadow-blue-600/20 active:scale-95 transition-all hover:bg-blue-500">
                                    فتح النظام
                                </button>
                                <button onClick={() => setShowAdminLogin(false)} className="mt-8 text-slate-600 text-sm font-bold hover:text-white transition-colors">إلغاء الأمر</button>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/98 p-4 backdrop-blur-2xl overflow-y-auto py-10">
                            <div className="bg-[#0a0a0a] p-8 md:p-12 rounded-[3rem] w-full max-w-2xl relative border border-white/10 shadow-[0_0_100px_-20px_rgba(37,99,235,0.15)] my-auto mt-20 md:mt-auto">
                                <button onClick={closeUploadModal} className="absolute top-8 left-8 text-slate-600 hover:text-white transition-colors p-2 z-10 bg-black/50 rounded-full">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                                
                                <h2 className="text-3xl font-black mb-10 tracking-tight text-right uppercase border-r-4 border-blue-600 pr-5">
                                    {uploadSuccessData ? "تمت المهمة" : "استبيان الشكوى وإرفاق الدليل"}
                                </h2>
                                
                                {statusNote && (
                                    <div className={`mb-8 p-5 rounded-[1.5rem] flex items-center gap-4 border ${statusNote.type === 'error' ? 'bg-red-500/10 border-red-500/20 text-red-400' : 'bg-green-500/10 border-green-500/20 text-green-400'}`}>
                                        <i data-lucide={statusNote.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-6 h-6 shrink-0"></i>
                                        <p className="text-sm font-bold text-right leading-relaxed flex-grow">{statusNote.msg}</p>
                                    </div>
                                )}

                                {uploadSuccessData ? (
                                    <div className="space-y-8 animate-in fade-in zoom-in duration-500">
                                        <div className="bg-white/[0.02] border border-white/5 rounded-[2rem] p-8 text-center">
                                            <div className="w-20 h-20 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                                <i data-lucide="send" className="w-10 h-10 ml-1"></i>
                                            </div>
                                            <h3 className="text-2xl font-black mb-3 text-green-400">تم إرسال الشكوى للديسكورد!</h3>
                                            <p className="text-slate-400 mb-8 leading-relaxed">
                                                تم إرسال الاستبيان بالكامل مع رابط الفيديو المرفق إلى روم الإدارة في الديسكورد بنجاح. لا حاجة لنسخ أي شيء.
                                            </p>
                                            
                                            <button onClick={closeUploadModal} className="w-full bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-bold transition-all text-white">
                                                العودة للصفحة الرئيسية
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <form onSubmit={handleUpload} className="space-y-6 text-right animate-in fade-in duration-500">
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-3">
                                                <label className="text-[11px] text-slate-500 mr-2 font-bold tracking-wider block">1- المشتكي <span className="text-red-500">*</span></label>
                                                <input name="complainer" required className="w-full bg-white/[0.03] rounded-2xl p-4 outline-none border border-white/5 focus:border-blue-600 text-white text-sm transition-all" placeholder="اسمك أو الآيدي" />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-[11px] text-slate-500 mr-2 font-bold tracking-wider block">2- المشتكي عليه <span className="text-red-500">*</span></label>
                                                <input name="complainedAgainst" required className="w-full bg-white/[0.03] rounded-2xl p-4 outline-none border border-white/5 focus:border-blue-600 text-white text-sm transition-all" placeholder="الطرف الآخر" />
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            <label className="text-[11px] text-slate-500 mr-2 font-bold tracking-wider block">3- المخالفة أو سبب الشكوى <span className="text-red-500">*</span></label>
                                            <textarea name="reason" required className="w-full bg-white/[0.03] rounded-2xl p-4 outline-none border border-white/5 focus:border-blue-600 resize-none text-white text-sm transition-all" placeholder="اشرح المخالفة باختصار..." rows="2"></textarea>
                                        </div>

                                        <div className="space-y-3">
                                            <label className="text-[11px] text-slate-500 mr-2 font-bold tracking-wider block">4- المحاسبة (إن كان يوجد)</label>
                                            <input name="punishment" className="w-full bg-white/[0.03] rounded-2xl p-4 outline-none border border-white/5 focus:border-blue-600 text-white text-sm transition-all" placeholder="مثال: باند، إنذار (اختياري)" />
                                        </div>

                                        <div className="space-y-3 pt-4 border-t border-white/5">
                                            <label className="text-[11px] text-slate-500 mr-2 font-bold tracking-wider block">5- التصوير أو الإثبات (الملف الرقمي) <span className="text-red-500">*</span></label>
                                            <div className="relative group">
                                                <input name="file" type="file" required className="w-full bg-white/[0.02] rounded-2xl p-8 border-2 border-dashed border-white/10 text-slate-500 text-sm cursor-pointer group-hover:border-blue-600/50 group-hover:bg-blue-600/[0.02] transition-all file:hidden text-center relative z-10 opacity-0" accept="video/*,image/*" onChange={(e) => { if(e.target.files[0]) { e.target.parentElement.querySelector('.file-label').innerHTML = `<span class="text-blue-400 font-bold">تم اختيار الملف: ${e.target.files[0].name}</span>`; } }} />
                                                <div className="file-label absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-colors border-2 border-dashed border-white/10 rounded-2xl group-hover:border-blue-600/50 group-hover:bg-blue-600/[0.02]">
                                                    <i data-lucide="video" className="w-8 h-8 mb-2 opacity-30 group-hover:opacity-100 group-hover:text-blue-500 transition-all block"></i>
                                                    <span className="font-bold text-sm">اضغط هنا لاختيار الفيديو</span>
                                                </div>
                                            </div>
                                            <p className="text-[10px] text-red-500/80 text-center mt-2">ملاحظة: عدم الالتزام بإرسال التصوير يعرضك للمحاسبة.</p>
                                        </div>

                                        {uploading && (
                                            <div className="space-y-3 pt-4">
                                                <div className="flex justify-between text-[10px] font-black uppercase tracking-[0.2em] text-blue-500">
                                                    <span>{uploadProgress < 100 ? "جاري الرفع للسحابة..." : "جاري الإرسال للديسكورد..."}</span>
                                                    <span>{uploadProgress}%</span>
                                                </div>
                                                <div className="w-full bg-white/5 h-3 rounded-full overflow-hidden p-1 border border-white/10 shadow-inner relative">
                                                    <div className="bg-gradient-to-l from-blue-600 to-indigo-600 h-full rounded-full transition-all duration-300 relative overflow-hidden" style={{width: `${uploadProgress}%`}}>
                                                        <div className="absolute inset-0 bg-[linear-gradient(45deg,rgba(255,255,255,0.2)_25%,transparent_25%,transparent_50%,rgba(255,255,255,0.2)_50%,rgba(255,255,255,0.2)_75%,transparent_75%,transparent)] bg-[length:20px_20px]" style={{animation: "progress-shimmer 1s linear infinite"}}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        <button disabled={uploading} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-xl disabled:opacity-30 flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-xl shadow-blue-600/30 border border-blue-400/20 group mt-6">
                                            {uploading ? (
                                                <i data-lucide="loader-2" className="w-7 h-7 animate-spin text-white block"></i>
                                            ) : (
                                                <>
                                                    <i data-lucide="send" className="w-6 h-6 group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform block"></i> 
                                                    <span>إرسال الشكوى</span>
                                                </>
                                            )}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
