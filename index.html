<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الشكاوي - عبدالله</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات Firebase الخاصة بعبدالله
        const firebaseConfig = {
            apiKey: "AIzaSyAY_d2xN4LttgidRoHpHa_jH1NZkYGxOHQ",
            authDomain: "complaints-archive.firebaseapp.com",
            projectId: "complaints-archive",
            storageBucket: "complaints-archive.firebasestorage.app",
            messagingSenderId: "765352455359",
            appId: "1:765352455359:web:4a033e9a6f26fcc09f2a0a",
            measurementId: "G-8DQ96Y0G9S"
        };

        const app = initializeApp(firebaseConfig);
        window.fb = { 
            auth: getAuth(app), 
            db: getFirestore(app),
            signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, doc, deleteDoc 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const { auth, db, signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, doc, deleteDoc } = window.fb;
            
            const [user, setUser] = useState(null);
            const [complaints, setComplaints] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [passInput, setPassInput] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [copiedId, setCopiedId] = useState(null);

            // إعدادات Cloudinary الخاصة بعبدالله
            const CLOUD_NAME = "dcgw0c0nv";
            const UPLOAD_PRESET = "Archive_Acc_1";
            const ADMIN_PASS = "123456"; 

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, setUser);
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(collection(db, 'complaints'), (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setComplaints(list.sort((a,b) => b.at - a.at));
                    setTimeout(() => lucide.createIcons(), 200);
                });
                return unsub;
            }, [user]);

            const handleUpload = async (e) => {
                e.preventDefault();
                const file = e.target.elements.file.files[0];
                const title = e.target.elements.title.value;
                const desc = e.target.elements.desc.value;

                if (!file || !title) return;
                setUploading(true);

                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                        method: 'POST', body: formData
                    });
                    const resJson = await res.json();

                    await addDoc(collection(db, 'complaints'), {
                        title, desc, url: resJson.secure_url, type: file.type, at: Date.now()
                    });

                    setIsModalOpen(false);
                    alert("تم الرفع بنجاح!");
                } catch (e) { alert("خطأ في الرفع! تأكد من إعدادات Cloudinary"); }
                setUploading(false);
            };

            const filtered = complaints.filter(c => c.title.includes(searchTerm));

            return (
                <div className="min-h-screen">
                    <nav className="h-20 glass sticky top-0 z-50 px-6 flex items-center justify-between border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30"><i data-lucide="shield"></i></div>
                            <h1 className="text-xl font-black">أرشيف جيمي <span className="text-xs text-blue-500 mr-2">{isAdmin ? 'ADMIN' : 'USER'}</span></h1>
                        </div>
                        <div className="flex gap-2">
                            {!isAdmin ? (
                                <button onClick={() => setShowAdminLogin(true)} className="p-2 text-slate-500 hover:text-white transition-all"><i data-lucide="lock"></i></button>
                            ) : (
                                <button onClick={() => setIsAdmin(false)} className="p-2 text-red-500"><i data-lucide="log-out"></i></button>
                            )}
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-500 transition-all shadow-lg flex items-center gap-2">
                                <i data-lucide="plus"></i> رفع بلاغ
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 py-10">
                        {isAdmin ? (
                            <>
                                <input className="w-full mb-8 bg-white/5 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-600" placeholder="بحث في الأرشيف..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filtered.map(c => (
                                        <div key={c.id} className="glass rounded-[2rem] overflow-hidden group hover:border-blue-500/30 transition-all">
                                            <div className="aspect-video bg-black relative">
                                                {c.type.includes('video') ? <video src={c.url} controls className="w-full h-full object-cover" /> : <img src={c.url} className="w-full h-full object-cover" />}
                                            </div>
                                            <div className="p-6">
                                                <h3 className="font-bold text-lg mb-1 truncate text-white">{c.title}</h3>
                                                <p className="text-slate-500 text-[10px] mb-4">{new Date(c.at).toLocaleString('ar-EG')}</p>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { navigator.clipboard.writeText(c.url); setCopiedId(c.id); setTimeout(() => setCopiedId(null), 2000); }} 
                                                            className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all ${copiedId === c.id ? 'bg-green-600' : 'bg-blue-600 hover:bg-blue-500'}`}>
                                                        {copiedId === c.id ? 'تم النسخ' : 'نسخ لديسكورد'}
                                                    </button>
                                                    <button onClick={async () => confirm('حذف؟') && await deleteDoc(doc(db, 'complaints', c.id))} className="p-3 bg-red-900/10 text-red-500 rounded-xl hover:bg-red-600 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="text-center py-20">
                                <div className="w-24 h-24 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-blue-500/10 shadow-inner"><i data-lucide="upload-cloud" className="w-12 h-12 text-blue-500"></i></div>
                                <h2 className="text-4xl font-black mb-4 tracking-tight">نظام إيداع الأدلة</h2>
                                <p className="text-slate-500 mb-10 text-lg leading-relaxed">ارفع دليلك هنا، وسيتم حفظه للأدمن بشكل آمن ودائم <br/> مجاني 100% ولا يحذف الفيديوهات.</p>
                                <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 px-12 py-5 rounded-[2.5rem] font-black text-xl shadow-2xl active:scale-95 transition-all shadow-blue-600/20">ابدأ الرفع الآن</button>
                            </div>
                        )}
                    </main>

                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md">
                            <div className="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center">
                                <h2 className="text-xl font-bold mb-6 text-white">دخول الإدارة</h2>
                                <input type="password" autoFocus className="w-full bg-white/5 rounded-2xl p-4 text-center text-2xl tracking-[0.5em] outline-none border border-white/5 focus:border-blue-600" placeholder="******" value={passInput} onChange={e => setPassInput(e.target.value)} />
                                <button onClick={() => { if(passInput === ADMIN_PASS) { setIsAdmin(true); setShowAdminLogin(false); setPassInput(""); } else alert('خطأ!') }} className="w-full bg-blue-600 py-4 rounded-2xl mt-4 font-bold shadow-lg transition-all hover:bg-blue-500">دخول</button>
                                <button onClick={() => setShowAdminLogin(false)} className="mt-4 text-slate-500 text-sm">إلغاء</button>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4">
                            <div className="glass p-8 rounded-[3rem] w-full max-w-xl relative overflow-hidden">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 left-8 text-slate-500"><i data-lucide="x"></i></button>
                                <h2 className="text-2xl font-black mb-8 text-white tracking-tight">رفع دليل جديد</h2>
                                <form onSubmit={handleUpload} className="space-y-6">
                                    <input name="title" required className="w-full bg-white/5 rounded-2xl p-4 outline-none border border-white/5 focus:border-blue-600 text-white" placeholder="عنوان الشكوى (مثال: تخريب روم)" />
                                    <textarea name="desc" className="w-full bg-white/5 rounded-2xl p-4 outline-none border border-white/5 focus:border-blue-600 resize-none text-white" placeholder="تفاصيل إضافية..." rows="2"></textarea>
                                    <input name="file" type="file" required className="w-full bg-white/5 rounded-2xl p-4 border border-white/5 border-dashed text-slate-400" accept="video/*,image/*" />
                                    <button disabled={uploading} className="w-full bg-blue-600 py-5 rounded-[1.5rem] font-black text-lg disabled:opacity-30 flex items-center justify-center gap-3 transition-all active:scale-95">
                                        {uploading ? <div className="w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div> : <><i data-lucide="shield-check"></i> إرسال للأرشيف</>}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
