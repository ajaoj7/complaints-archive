<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Archive System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .status-enter { animation: slideDown 0.4s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY_d2xN4LttgidRoHpHa_jH1NZkYGxOHQ",
            authDomain: "complaints-archive.firebaseapp.com",
            projectId: "complaints-archive",
            storageBucket: "complaints-archive.firebasestorage.app",
            messagingSenderId: "765352455359",
            appId: "1:765352455359:web:4a033e9a6f26fcc09f2a0a",
            measurementId: "G-8DQ96Y0G9S"
        };

        const app = initializeApp(firebaseConfig);
        window.fb = { auth: getAuth(app), db: getFirestore(app), signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, doc, deleteDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const { auth, db, signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, doc, deleteDoc } = window.fb;
            const [user, setUser] = useState(null);
            const [complaints, setComplaints] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [passInput, setPassInput] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [status, setStatus] = useState({ type: '', msg: '' });

            const CLOUD_NAME = "dcgw0c0nv";
            const UPLOAD_PRESET = "Archive_Acc_1";
            const ADMIN_PASS = "123456"; 

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, setUser);
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(collection(db, 'complaints'), (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setComplaints(list.sort((a,b) => b.at - a.at));
                    setTimeout(() => lucide.createIcons(), 200);
                });
                return unsub;
            }, [user]);

            const handleUpload = async (e) => {
                e.preventDefault();
                const file = e.target.elements.file.files[0];
                const title = e.target.elements.title.value;
                const desc = e.target.elements.desc.value;

                if (!file || !title) return;
                setUploading(true);
                setUploadProgress(0);

                try {
                    // نظام الرفع المتقدم (XHR) لدعم الملفات الكبيرة ومتابعة النسبة المئوية
                    const xhr = new XMLHttpRequest();
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, true);

                    xhr.upload.onprogress = (event) => {
                        if (event.lengthComputable) {
                            const percent = Math.round((event.loaded / event.total) * 100);
                            setUploadProgress(percent);
                        }
                    };

                    xhr.onload = async () => {
                        if (xhr.status === 200) {
                            const resJson = JSON.parse(xhr.responseText);
                            await addDoc(collection(db, 'complaints'), {
                                title: `تذكرة: ${title}`,
                                desc,
                                url: resJson.secure_url,
                                type: file.type,
                                at: Date.now()
                            });
                            setStatus({ type: 'success', msg: 'تم حفظ الدليل بنجاح.' });
                            setIsModalOpen(false);
                            setUploading(false);
                        } else {
                            const err = JSON.parse(xhr.responseText);
                            setStatus({ type: 'error', msg: `خطأ: ${err.error.message}` });
                            setUploading(false);
                        }
                    };

                    xhr.onerror = () => {
                        setStatus({ type: 'error', msg: 'فشل الاتصال بالخادم. تأكد من حجم الملف.' });
                        setUploading(false);
                    };

                    xhr.send(formData);

                } catch (e) {
                    setStatus({ type: 'error', msg: 'حدث خطأ غير متوقع.' });
                    setUploading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="h-20 glass sticky top-0 z-50 px-6 flex items-center justify-between border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                                <i data-lucide="database"></i>
                            </div>
                            <h1 className="text-xl font-black tracking-tighter uppercase">Marvel Archive System</h1>
                        </div>
                        <div className="flex gap-2">
                            {!isAdmin ? (
                                <button onClick={() => setShowAdminLogin(true)} className="p-2 text-slate-500 hover:text-white transition-all"><i data-lucide="lock"></i></button>
                            ) : (
                                <button onClick={() => setIsAdmin(false)} className="p-2 text-red-500"><i data-lucide="log-out"></i></button>
                            )}
                            <button onClick={() => { setStatus({type:'', msg:''}); setIsModalOpen(true); }} className="bg-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-500 transition-all shadow-lg flex items-center gap-2 text-sm">
                                <i data-lucide="plus" className="w-4 h-4"></i> إيداع دليل
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto w-full px-6 py-10 flex-grow">
                        {status.msg && !isModalOpen && (
                            <div className={`mb-8 p-5 rounded-2xl flex items-center gap-4 status-enter border ${status.type === 'success' ? 'bg-green-500/10 border-green-500/20 text-green-400' : 'bg-red-500/10 border-red-500/20 text-red-400'}`}>
                                <i data-lucide={status.type === 'success' ? 'check-circle' : 'alert-circle'} className="w-6 h-6 shrink-0"></i>
                                <p className="text-sm font-bold">{status.msg}</p>
                                <button onClick={() => setStatus({type:'', msg:''})} className="mr-auto opacity-50 hover:opacity-100"><i data-lucide="x" className="w-5 h-5"></i></button>
                            </div>
                        )}

                        {isAdmin ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {complaints.map(c => (
                                    <div key={c.id} className="glass rounded-[2rem] overflow-hidden group border border-white/5 hover:border-blue-500/30 transition-all duration-300">
                                        <div className="aspect-video bg-black">
                                            {c.type.includes('video') ? <video src={c.url} controls className="w-full h-full object-cover" /> : <img src={c.url} className="w-full h-full object-cover" />}
                                        </div>
                                        <div className="p-6">
                                            <h3 className="font-bold text-lg mb-1 truncate text-white">{c.title}</h3>
                                            <p className="text-slate-500 text-[10px] mb-4 uppercase tracking-widest">{new Date(c.at).toLocaleString('ar-EG')}</p>
                                            <p className="text-slate-400 text-sm mb-6 line-clamp-2 h-10">{c.desc || "لا توجد تفاصيل."}</p>
                                            <div className="flex gap-2">
                                                <button onClick={() => { navigator.clipboard.writeText(c.url); setStatus({type:'success', msg: 'تم نسخ الرابط'}); }} className="flex-1 py-3 bg-blue-600/10 text-blue-400 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">نسخ الرابط</button>
                                                <button onClick={async () => confirm('حذف؟') && await deleteDoc(doc(db, 'complaints', c.id))} className="p-3 bg-red-900/10 text-red-500 rounded-xl hover:bg-red-600 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-24 max-w-2xl mx-auto">
                                <div className="w-24 h-24 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-10 border border-blue-500/10 text-blue-500">
                                    <i data-lucide="upload-cloud" className="w-12 h-12"></i>
                                </div>
                                <h2 className="text-5xl font-black mb-6 tracking-tighter">نظام الأرشفة المركزي</h2>
                                <p className="text-slate-500 mb-12 text-lg">نظام مخصص لتوثيق وحفظ الأدلة والشكاوي بشكل رسمي.<br/>سيتم حفظ الملفات مباشرة في سجلات الإدارة.</p>
                                <button onClick={() => { setStatus({type:'', msg:''}); setIsModalOpen(true); }} className="bg-blue-600 px-16 py-6 rounded-[2.5rem] font-black text-2xl shadow-2xl active:scale-95 transition-all">ابدأ عملية الإيداع</button>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 text-center text-slate-800 text-[10px] border-t border-white/5 uppercase tracking-[0.4em] font-bold">
                        Marvel Archive System © 2026
                    </footer>

                    {/* Admin Login */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-md px-4">
                            <div className="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center">
                                <h2 className="text-xl font-bold mb-8 text-white">دخول النظام</h2>
                                <input type="password" autoFocus className="w-full bg-white/5 rounded-2xl p-4 text-center text-3xl tracking-[0.5em] outline-none border border-white/5 focus:border-blue-600" placeholder="******" value={passInput} onChange={e => setPassInput(e.target.value)} />
                                <button onClick={() => { if(passInput === ADMIN_PASS) { setIsAdmin(true); setShowAdminLogin(false); setPassInput(""); } else alert('خطأ!') }} className="w-full bg-blue-600 py-4 rounded-2xl mt-6 font-bold text-lg">تحقق</button>
                                <button onClick={() => setShowAdminLogin(false)} className="mt-6 text-slate-600 text-sm">إلغاء</button>
                            </div>
                        </div>
                    )}

                    {/* Upload Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/98 p-4 backdrop-blur-md">
                            <div className="glass p-10 rounded-[3rem] w-full max-w-xl relative overflow-hidden">
                                <button onClick={() => !uploading && setIsModalOpen(false)} className="absolute top-10 left-10 text-slate-500 hover:text-white transition-colors"><i data-lucide="x" className="w-8 h-8"></i></button>
                                <h2 className="text-3xl font-black mb-10 tracking-tight">إيداع دليل جديد</h2>
                                
                                {status.msg && (
                                    <div className={`mb-8 p-5 rounded-2xl flex items-center gap-4 border ${status.type === 'error' ? 'bg-red-500/10 border-red-500/20 text-red-400' : 'bg-green-500/10 border-green-500/20 text-green-400'}`}>
                                        <i data-lucide={status.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-6 h-6 shrink-0"></i>
                                        <p className="text-sm font-bold">{status.msg}</p>
                                    </div>
                                )}

                                <form onSubmit={handleUpload} className="space-y-8">
                                    <div>
                                        <label className="text-[11px] text-slate-500 mr-2 uppercase font-black tracking-widest block mb-3">رقم التذكرة (إجباري)</label>
                                        <input name="title" required className="w-full bg-white/5 rounded-2xl p-5 outline-none border border-white/5 focus:border-blue-600 text-white text-lg" placeholder="مثال: 5042" />
                                    </div>
                                    <div>
                                        <label className="text-[11px] text-slate-500 mr-2 uppercase font-black tracking-widest block mb-3">تفاصيل إضافية (اختياري)</label>
                                        <textarea name="desc" className="w-full bg-white/5 rounded-2xl p-5 outline-none border border-white/5 focus:border-blue-600 resize-none text-white" placeholder="أضف وصفاً مختصراً إذا لزم الأمر" rows="2"></textarea>
                                    </div>
                                    <div>
                                        <label className="text-[11px] text-slate-500 mr-2 uppercase font-black tracking-widest block mb-3">الملف</label>
                                        <input name="file" type="file" required className="w-full bg-white/5 rounded-2xl p-5 border-2 border-dashed border-white/10 text-slate-400 text-sm" accept="video/*,image/*" />
                                    </div>

                                    {uploading && (
                                        <div className="w-full bg-white/5 h-4 rounded-full overflow-hidden mb-4">
                                            <div className="bg-blue-600 h-full transition-all duration-300" style={{width: `${uploadProgress}%`}}></div>
                                        </div>
                                    )}

                                    <button disabled={uploading} className="w-full bg-blue-600 py-6 rounded-[2rem] font-black text-xl disabled:opacity-30 flex items-center justify-center gap-4 transition-all active:scale-95 shadow-2xl shadow-blue-600/20">
                                        {uploading ? <span className="flex items-center gap-2 tracking-widest">{uploadProgress}% جاري الرفع...</span> : <><i data-lucide="check-circle" className="w-6 h-6"></i> تأكيد وحفظ الدليل</>}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
